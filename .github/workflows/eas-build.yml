name: EAS Build

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:
    inputs:
      platform:
        description: 'Platform to build'
        required: true
        default: 'android'
        type: choice
        options:
          - android
          - ios
          - all

jobs:
  lint:
    name: Type Check
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20.x

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10
          run_install: false

      - name: Get pnpm store directory
        id: pnpm-cache
        run: echo "STORE_PATH=$(pnpm store path --silent)" >> $GITHUB_ENV

      - name: Cache pnpm store
        uses: actions/cache@v4
        with:
          path: ${{ env.STORE_PATH }}
          key: ${{ runner.os }}-pnpm-${{ hashFiles('**/pnpm-lock.yaml') }}
          restore-keys: ${{ runner.os }}-pnpm-

      - name: Install dependencies (workspace root)
        run: pnpm install --frozen-lockfile

      - name: Run TypeScript check
        run: pnpm --filter @workspace/privacy-browser run typecheck

  build:
    name: EAS Build (${{ github.event.inputs.platform || 'android' }})
    runs-on: ubuntu-latest
    needs: lint
    if: github.event_name != 'pull_request'
    outputs:
      android_url: ${{ steps.get_url.outputs.android_url }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20.x

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10
          run_install: false

      - name: Get pnpm store directory
        id: pnpm-cache
        run: echo "STORE_PATH=$(pnpm store path --silent)" >> $GITHUB_ENV

      - name: Cache pnpm store
        uses: actions/cache@v4
        with:
          path: ${{ env.STORE_PATH }}
          key: ${{ runner.os }}-pnpm-${{ hashFiles('**/pnpm-lock.yaml') }}
          restore-keys: ${{ runner.os }}-pnpm-

      - name: Install dependencies (workspace root)
        run: pnpm install --frozen-lockfile

      - name: Setup Expo & EAS CLI
        uses: expo/expo-github-action@v8
        with:
          eas-version: latest
          token: ${{ secrets.EXPO_TOKEN }}

      - name: Build Android (preview APK)
        id: build_android
        if: ${{ github.event.inputs.platform != 'ios' }}
        working-directory: artifacts/privacy-browser
        env:
          EXPO_TOKEN: ${{ secrets.EXPO_TOKEN }}
        run: |
          eas build --platform android --profile preview --non-interactive --json \
            2>/tmp/build_stderr.txt | tee /tmp/build_output.json
          echo "--- Build stderr ---"
          cat /tmp/build_stderr.txt || true

      - name: Build iOS (simulator)
        if: ${{ github.event.inputs.platform == 'ios' || github.event.inputs.platform == 'all' }}
        working-directory: artifacts/privacy-browser
        env:
          EXPO_TOKEN: ${{ secrets.EXPO_TOKEN }}
        run: eas build --platform ios --profile preview --non-interactive

      - name: Get latest Android build URL
        id: get_url
        if: ${{ github.event.inputs.platform != 'ios' }}
        working-directory: artifacts/privacy-browser
        env:
          EXPO_TOKEN: ${{ secrets.EXPO_TOKEN }}
        run: |
          APK_URL=$(python3 -c "
          import json, sys
          try:
            data = json.load(open('/tmp/build_output.json'))
            builds = data if isinstance(data, list) else [data]
            for b in builds:
              arts = b.get('artifacts') or {}
              url = (arts.get('applicationArchiveUrl') or
                     arts.get('buildUrl') or
                     b.get('buildUrl') or
                     b.get('applicationArchiveUrl') or '')
              if url:
                print(url)
                sys.exit(0)
          except Exception as e:
            sys.stderr.write(str(e) + '\n')
          " 2>/tmp/parse_err.txt || true)

          if [ -z "$APK_URL" ]; then
            echo "JSON parse got nothing, falling back to eas build:list"
            cat /tmp/parse_err.txt || true
            APK_URL=$(eas build:list --platform android --limit 5 --json 2>/dev/null | python3 -c "
          import sys, json
          try:
            builds = json.load(sys.stdin)
            for b in builds:
              if b.get('status') in ('FINISHED', 'finished'):
                arts = b.get('artifacts') or {}
                url = (arts.get('applicationArchiveUrl') or
                       arts.get('buildUrl') or
                       b.get('buildUrl') or
                       b.get('applicationArchiveUrl') or '')
                if url:
                  print(url)
                  sys.exit(0)
          except Exception as e:
            sys.stderr.write(str(e) + '\n')
          " 2>/dev/null || true)
          fi

          echo "android_url=$APK_URL" >> $GITHUB_OUTPUT
          echo "Latest Android APK: $APK_URL"

  release:
    name: Publish GitHub Release
    runs-on: ubuntu-latest
    needs: build
    if: ${{ github.event_name != 'pull_request' && needs.build.outputs.android_url != '' }}
    permissions:
      contents: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Download APK from Expo
        env:
          ANDROID_URL: ${{ needs.build.outputs.android_url }}
        run: |
          echo "Downloading APK from: $ANDROID_URL"
          curl -L -o null-trace.apk "$ANDROID_URL"
          ls -lh null-trace.apk

      - name: Generate release tag
        id: tag
        run: |
          TAG="build-$(date +'%Y%m%d')-$(echo '${{ github.sha }}' | cut -c1-7)"
          echo "tag=$TAG" >> $GITHUB_OUTPUT
          echo "Tag: $TAG"

      - name: Delete existing release with same date tag (if any)
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG: ${{ steps.tag.outputs.tag }}
        run: |
          gh release delete "$TAG" --yes 2>/dev/null || true
          git push --delete origin "refs/tags/$TAG" 2>/dev/null || true

      - name: Create GitHub Release and upload APK
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG: ${{ steps.tag.outputs.tag }}
          ANDROID_URL: ${{ needs.build.outputs.android_url }}
        run: |
          gh release create "$TAG" null-trace.apk \
            --title "Null Trace $(date +'%Y-%m-%d') (build $(echo '${{ github.sha }}' | cut -c1-7))" \
            --notes "## Null Trace Android APK

          **Commit:** \`${{ github.sha }}\`
          **Branch:** \`${{ github.ref_name }}\`
          **Built:** $(date +'%Y-%m-%d %H:%M UTC')

          ### Install
          1. Download \`null-trace.apk\` below
          2. On your Android device: **Settings → Security → Allow unknown apps**
          3. Open the APK file and tap Install

          ### Build details
          - Bundle ID: \`com.kakarot.nulltrace\`
          - Profile: preview (APK)
          - Expo SDK 54 · React Native 0.81.5 · New Architecture enabled
          - EAS source: $ANDROID_URL" \
            --latest

      - name: Update README and push
        env:
          ANDROID_URL: ${{ needs.build.outputs.android_url }}
          TAG: ${{ steps.tag.outputs.tag }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          # Pull latest first (before modifying any file)
          git pull --rebase origin main

          # Now update README
          BADGE="[![Download APK](https://img.shields.io/badge/Download-Android%20APK-3DDC84?logo=android&logoColor=white)](https://github.com/kakarot-oncloud/null-trace/releases/latest)"
          python3 -c "
          import re, os
          badge = os.environ['BADGE']
          content = open('README.md').read()
          new = re.sub(r'<!-- LATEST_BUILD -->[^\n]*\n[^\n]*', '<!-- LATEST_BUILD -->\n' + badge, content)
          if new == content:
              new = re.sub(r'<!-- LATEST_BUILD -->[^\n]*', '<!-- LATEST_BUILD -->\n' + badge, content)
          open('README.md', 'w').write(new)
          print('README updated')
          " BADGE="$BADGE"

          git add README.md
          git diff --staged --quiet || git commit -m "ci: update README — release $TAG [skip ci]"
          git push
