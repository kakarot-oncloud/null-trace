name: EAS Build

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:
    inputs:
      platform:
        description: 'Platform to build'
        required: true
        default: 'android'
        type: choice
        options:
          - android
          - ios
          - all

jobs:
  lint:
    name: Type Check
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20.x

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10
          run_install: false

      - name: Get pnpm store directory
        id: pnpm-cache
        run: echo "STORE_PATH=$(pnpm store path --silent)" >> $GITHUB_ENV

      - name: Cache pnpm store
        uses: actions/cache@v4
        with:
          path: ${{ env.STORE_PATH }}
          key: ${{ runner.os }}-pnpm-${{ hashFiles('**/pnpm-lock.yaml') }}
          restore-keys: ${{ runner.os }}-pnpm-

      - name: Install dependencies (workspace root)
        run: pnpm install --frozen-lockfile

      - name: Run TypeScript check
        run: pnpm --filter @workspace/privacy-browser run typecheck

  build:
    name: EAS Build (${{ github.event.inputs.platform || 'android' }})
    runs-on: ubuntu-latest
    needs: lint
    if: github.event_name != 'pull_request'
    outputs:
      android_url: ${{ steps.get_url.outputs.android_url }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20.x

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10
          run_install: false

      - name: Get pnpm store directory
        id: pnpm-cache
        run: echo "STORE_PATH=$(pnpm store path --silent)" >> $GITHUB_ENV

      - name: Cache pnpm store
        uses: actions/cache@v4
        with:
          path: ${{ env.STORE_PATH }}
          key: ${{ runner.os }}-pnpm-${{ hashFiles('**/pnpm-lock.yaml') }}
          restore-keys: ${{ runner.os }}-pnpm-

      - name: Install dependencies (workspace root)
        run: pnpm install --frozen-lockfile

      - name: Setup Expo & EAS CLI
        uses: expo/expo-github-action@v8
        with:
          eas-version: latest
          token: ${{ secrets.EXPO_TOKEN }}

      - name: Build Android (preview APK)
        id: build_android
        if: ${{ github.event.inputs.platform != 'ios' }}
        working-directory: artifacts/privacy-browser
        env:
          EXPO_TOKEN: ${{ secrets.EXPO_TOKEN }}
        run: |
          # Separate stderr so JSON is clean; capture build ID immediately
          eas build --platform android --profile preview --non-interactive --json \
            2>/tmp/build_stderr.txt | tee /tmp/build_output.json
          echo "--- Build stderr ---"
          cat /tmp/build_stderr.txt || true

      - name: Build iOS (simulator)
        if: ${{ github.event.inputs.platform == 'ios' || github.event.inputs.platform == 'all' }}
        working-directory: artifacts/privacy-browser
        env:
          EXPO_TOKEN: ${{ secrets.EXPO_TOKEN }}
        run: eas build --platform ios --profile preview --non-interactive

      - name: Get latest Android build URL
        id: get_url
        if: ${{ github.event.inputs.platform != 'ios' }}
        working-directory: artifacts/privacy-browser
        env:
          EXPO_TOKEN: ${{ secrets.EXPO_TOKEN }}
        run: |
          # Try parsing URL from build JSON output first
          APK_URL=$(python3 -c "
          import json, sys
          try:
            data = json.load(open('/tmp/build_output.json'))
            builds = data if isinstance(data, list) else [data]
            for b in builds:
              arts = b.get('artifacts') or {}
              url = (arts.get('applicationArchiveUrl') or
                     arts.get('buildUrl') or
                     b.get('buildUrl') or
                     b.get('applicationArchiveUrl') or '')
              if url:
                print(url)
                sys.exit(0)
          except Exception as e:
            sys.stderr.write(str(e) + '\n')
          " 2>/tmp/parse_err.txt || true)

          # Fallback: query eas build:list for the most recent finished build
          if [ -z "\$APK_URL" ]; then
            echo "JSON parse got nothing, falling back to eas build:list"
            cat /tmp/parse_err.txt || true
            APK_URL=$(eas build:list --platform android --limit 5 --json 2>/dev/null | python3 -c "
          import sys, json
          try:
            builds = json.load(sys.stdin)
            for b in builds:
              if b.get('status') in ('FINISHED', 'finished'):
                arts = b.get('artifacts') or {}
                url = (arts.get('applicationArchiveUrl') or
                       arts.get('buildUrl') or
                       b.get('buildUrl') or
                       b.get('applicationArchiveUrl') or '')
                if url:
                  print(url)
                  sys.exit(0)
          except Exception as e:
            sys.stderr.write(str(e) + '\n')
          " 2>/dev/null || true)
          fi

          echo "android_url=$APK_URL" >> $GITHUB_OUTPUT
          echo "Latest Android APK: $APK_URL"

  update-readme:
    name: Update README with Download Link
    runs-on: ubuntu-latest
    needs: build
    if: ${{ github.event_name != 'pull_request' && needs.build.outputs.android_url != '' }}
    permissions:
      contents: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Update README download badge
        env:
          ANDROID_URL: ${{ needs.build.outputs.android_url }}
        run: |
          if [ -z "$ANDROID_URL" ]; then
            echo "No build URL found, skipping README update"
            exit 0
          fi

          BADGE="[![Download APK](https://img.shields.io/badge/Download-Android%20APK-3DDC84?logo=android&logoColor=white)]($ANDROID_URL)"
          MARKER="<!-- LATEST_BUILD -->"

          if grep -q "$MARKER" README.md; then
            # Replace the entire marker line (including any existing badge after it)
            python3 -c "
          import sys, re
          content = open('README.md').read()
          marker = '<!-- LATEST_BUILD -->'
          badge = '''$BADGE'''
          # Replace marker + everything up to next newline with marker + newline + badge
          new = re.sub(r'<!-- LATEST_BUILD -->.*', marker + '\n' + badge, content)
          open('README.md', 'w').write(new)
          print('README updated')
          "
          else
            sed -i "/Platform-Android/a ${MARKER}\n${BADGE}" README.md
          fi

          echo "Updated README with: $BADGE"

      - name: Commit README update
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add README.md
          git diff --staged --quiet || git commit -m "ci: update README with latest Android APK download link [skip ci]"
          git push
