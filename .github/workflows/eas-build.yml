name: EAS Build

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:
    inputs:
      platform:
        description: 'Platform to build'
        required: true
        default: 'android'
        type: choice
        options:
          - android
          - ios
          - all

jobs:
  lint:
    name: Type Check
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20.x

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9
          run_install: false

      - name: Get pnpm store directory
        id: pnpm-cache
        run: echo "STORE_PATH=$(pnpm store path --silent)" >> $GITHUB_ENV

      - name: Cache pnpm store
        uses: actions/cache@v4
        with:
          path: ${{ env.STORE_PATH }}
          key: ${{ runner.os }}-pnpm-${{ hashFiles('**/pnpm-lock.yaml') }}
          restore-keys: ${{ runner.os }}-pnpm-

      - name: Install dependencies (workspace root)
        run: pnpm install --frozen-lockfile

      - name: Run TypeScript check
        run: pnpm --filter @workspace/privacy-browser run typecheck

  build:
    name: EAS Build (${{ github.event.inputs.platform || 'android' }})
    runs-on: ubuntu-latest
    needs: lint
    if: github.event_name != 'pull_request'
    outputs:
      android_url: ${{ steps.get_url.outputs.android_url }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20.x

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9
          run_install: false

      - name: Get pnpm store directory
        id: pnpm-cache
        run: echo "STORE_PATH=$(pnpm store path --silent)" >> $GITHUB_ENV

      - name: Cache pnpm store
        uses: actions/cache@v4
        with:
          path: ${{ env.STORE_PATH }}
          key: ${{ runner.os }}-pnpm-${{ hashFiles('**/pnpm-lock.yaml') }}
          restore-keys: ${{ runner.os }}-pnpm-

      - name: Install dependencies (workspace root)
        run: pnpm install --frozen-lockfile

      - name: Setup Expo & EAS CLI
        uses: expo/expo-github-action@v8
        with:
          eas-version: latest
          token: ${{ secrets.EXPO_TOKEN }}

      - name: Create / link EAS project
        working-directory: artifacts/privacy-browser
        env:
          EXPO_TOKEN: ${{ secrets.EXPO_TOKEN }}
        run: eas init --non-interactive --force

      - name: Build Android (preview APK)
        id: build_android
        if: ${{ github.event.inputs.platform != 'ios' }}
        working-directory: artifacts/privacy-browser
        env:
          EXPO_TOKEN: ${{ secrets.EXPO_TOKEN }}
        run: |
          eas build --platform android --profile preview --non-interactive --json > /tmp/build_output.json 2>&1 || true
          cat /tmp/build_output.json
          BUILD_URL=$(python3 -c "
          import json, sys
          try:
            data = json.load(open('/tmp/build_output.json'))
            if isinstance(data, list) and data:
              print(data[0].get('artifacts', {}).get('buildUrl', '') or data[0].get('buildUrl', ''))
            elif isinstance(data, dict):
              print(data.get('artifacts', {}).get('buildUrl', '') or data.get('buildUrl', ''))
          except: pass
          " 2>/dev/null || true)
          echo "android_url=$BUILD_URL" >> $GITHUB_OUTPUT

      - name: Build iOS (simulator)
        if: ${{ github.event.inputs.platform == 'ios' || github.event.inputs.platform == 'all' }}
        working-directory: artifacts/privacy-browser
        env:
          EXPO_TOKEN: ${{ secrets.EXPO_TOKEN }}
        run: eas build --platform ios --profile preview --non-interactive

      - name: Get latest Android build URL
        id: get_url
        if: ${{ github.event.inputs.platform != 'ios' && steps.build_android.outputs.android_url == '' }}
        working-directory: artifacts/privacy-browser
        env:
          EXPO_TOKEN: ${{ secrets.EXPO_TOKEN }}
        run: |
          LATEST=$(eas build:list --platform android --limit 1 --json 2>/dev/null | python3 -c "
          import sys, json
          try:
            d = json.load(sys.stdin)
            print(d[0].get('artifacts', {}).get('buildUrl', '') if d else '')
          except: pass
          " 2>/dev/null || true)
          echo "android_url=$LATEST" >> $GITHUB_OUTPUT
          echo "Latest Android build: $LATEST"

  update-readme:
    name: Update README with Download Link
    runs-on: ubuntu-latest
    needs: build
    if: ${{ github.event_name != 'pull_request' && needs.build.outputs.android_url != '' }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Update README download badge
        env:
          ANDROID_URL: ${{ needs.build.outputs.android_url }}
        run: |
          if [ -z "$ANDROID_URL" ]; then
            echo "No build URL found, skipping README update"
            exit 0
          fi

          BADGE="[![Download APK](https://img.shields.io/badge/Download-Android%20APK-3DDC84?logo=android&logoColor=white)]($ANDROID_URL)"
          MARKER="<!-- LATEST_BUILD -->"

          if grep -q "$MARKER" README.md; then
            sed -i "s|${MARKER}.*|${MARKER} ${BADGE}|" README.md
          else
            sed -i "/Platform-Android/a ${MARKER} ${BADGE}" README.md
          fi

          echo "Updated README with: $BADGE"

      - name: Commit README update
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add README.md
          git diff --staged --quiet || git commit -m "ci: update README with latest Android APK download link [skip ci]"
          git push
