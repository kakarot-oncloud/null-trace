name: EAS Build

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:
    inputs:
      platform:
        description: 'Platform to build'
        required: true
        default: 'android'
        type: choice
        options:
          - android
          - ios
          - all

jobs:
  build:
    name: EAS Build (${{ github.event.inputs.platform || 'android' }})
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20.x
          cache: npm
          cache-dependency-path: artifacts/privacy-browser/package.json

      - name: Setup Expo & EAS CLI
        uses: expo/expo-github-action@v8
        with:
          eas-version: latest
          token: ${{ secrets.EXPO_TOKEN }}

      - name: Install dependencies
        working-directory: artifacts/privacy-browser
        run: npm install

      - name: Build Android (preview APK)
        if: ${{ github.event.inputs.platform == 'android' || github.event.inputs.platform == '' || github.event_name == 'push' }}
        working-directory: artifacts/privacy-browser
        run: eas build --platform android --profile preview --non-interactive

      - name: Build iOS (simulator)
        if: ${{ github.event.inputs.platform == 'ios' || github.event.inputs.platform == 'all' }}
        working-directory: artifacts/privacy-browser
        run: eas build --platform ios --profile preview --non-interactive

  lint:
    name: Type Check
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20.x
          cache: npm
          cache-dependency-path: artifacts/privacy-browser/package.json

      - name: Install dependencies
        working-directory: artifacts/privacy-browser
        run: npm install

      - name: Run TypeScript check
        working-directory: artifacts/privacy-browser
        run: npx tsc --noEmit
